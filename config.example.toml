[stack]
install_dir = "/opt/proxy-stack"
timezone = "UTC"
install_docker = true
prune_dangling_images = true

[domains]
panel = "panel.example.net"
subscription = "sub.example.net"
node = "node.example.net"
# Required when panel.tls.mode = "acme_dns".
acme_email = "admin@example.net"

[cloudflare]
# Used by acme_dns DNS-01 issuance. Prefer CLOUDFLARE_API_TOKEN in the environment.
api_token = ""
# Root-only file containing only the token; convenient for unattended reruns.
api_token_file = ""

[ipv6]
enabled = true
auto_repair = true
rollback_on_failure = true
test_url = "https://api6.ipify.org"
test_image = "curlimages/curl:8.16.0"
test_subnet = "fd42:6d6f:6465::/64"
timeout = 15
route_wait_seconds = 20
sysctl_file = "/etc/sysctl.d/90-vpsdeploy-ipv6.conf"

[ports]
proxy = 443
panel_public = 8443
panel_internal = 2053
subscription_internal = 2096
publish_proxy_udp = false

[node]
# The protocol follows panel.backend: 3x-ui => VLESS Reality, s-ui => AnyTLS.
enabled = true
client_name = "primary"
# Existing generated client secrets are reused on repeated deployments.
# Set rotate_client_secret=true once to rotate them, then set it back to false.
rotate_client_secret = false

[node.reality]
target = "www.cloudflare.com"
server_name = "www.cloudflare.com"
fingerprint = "chrome"
flow = "xtls-rprx-vision"
# Pinning this version currently gives reliable Mihomo and sing-box interop.
xray_version = "v26.6.27"

[node.anytls]
padding_scheme = [
  "stop=8",
  "0=30-30",
  "1=100-400",
  "2=400-500,c,500-1000,c,500-1000,c,500-1000,c,500-1000",
  "3=9-9,500-1000",
  "4=500-1000",
  "5=500-1000",
  "6=500-1000",
  "7=500-1000",
]

[node.verify]
enabled = true
require_all_clients = true
test_url = "https://api4.ipify.org"
timeout = 30
mihomo_image = "metacubex/mihomo:v1.19.28"
singbox_image = "ghcr.io/sagernet/sing-box:v1.13.12"

[panel]
# Select exactly one node management backend: "3x-ui" (Xray) or "s-ui" (sing-box).
backend = "3x-ui"
path = "/"
subscription_path = "/sub"
allowed_cidrs = []

# Caddy BasicAuth protects only the panel host. The dedicated subscription
# host exposes only subscription_path and returns 404 for every other path.
# password_mode: "prompt", "generate", "config", or "environment".
basic_auth_user = "gateway-admin"
basic_auth_password_mode = "prompt"
basic_auth_password = ""
basic_auth_password_env = "VPSDEPLOY_CADDY_PASSWORD"

[panel.xui]
username = "xui-admin"
password_mode = "prompt"
password = ""
password_env = "VPSDEPLOY_XUI_PASSWORD"
cli = "auto"
allow_default_credentials = false

[panel.sui]
# Used only when panel.backend = "s-ui". S-UI manages the sing-box core and
# supports visual AnyTLS inbound, users, traffic statistics and subscriptions.
username = "sui-admin"
password_mode = "prompt"
password = ""
password_env = "VPSDEPLOY_SUI_PASSWORD"
cli = "auto"
allow_default_credentials = false

[panel.tls]
# acme_dns is required for the DNS-only subscription host because proxy clients
# must receive a publicly trusted certificate directly from Caddy.
mode = "acme_dns"
auto_create = true
validity_days = 5475
# Used only by cloudflare_origin mode after changing certificate hostnames.
force_reissue = false
api_token = ""
# Used only by cloudflare_origin mode. Leave empty to derive SANs automatically.
hostnames = []
certificate_file = "/root/cloudflare-origin.crt"
private_key_file = "/root/cloudflare-origin.key"

[docker]
xui_image = "ghcr.io/mhsanaei/3x-ui:latest"
sui_image = "alireza7/s-ui:v1.5.3"
caddy_image = "caddy:2-alpine"
network_name = "proxy_stack"
enable_ipv6 = true
ipv6_subnet = ""
force_rebuild_caddy = false

[dns]
enabled = false
provider = "cloudflare"
api_token = ""
api_token_file = ""
auto_detect_addresses = true
create_ipv4 = true
create_ipv6 = true
ttl = 1
ipv4_address = ""
ipv6_address = ""
ipv4_detection_url = "https://api4.ipify.org"
ipv6_detection_url = "https://api6.ipify.org"

[dns.panel]
enabled = true
proxied = true

[dns.subscription]
enabled = true
# Subscription clients connect directly to Caddy. Keep this DNS-only (grey cloud).
proxied = false

[dns.node]
enabled = true
# Reality must connect directly to the VPS and does not use an HTTPS certificate.
proxied = false

[dns.sub2api]
enabled = true
proxied = true

# Optional independent Sub2API stack: application + PostgreSQL + Redis.
[sub2api]
enabled = false
install_dir = "/opt/sub2api"
image = "weishaw/sub2api:latest"
domain = "api.example.net"
timezone = "Asia/Shanghai"
internal_port = 8080
# Keep false when Caddy is used. If enabled, only localhost is published.
publish_port = false
published_port = 8080
readiness_timeout = 120

admin_email = "admin@example.net"
admin_password_mode = "prompt"
admin_password = ""
admin_password_env = "VPSDEPLOY_SUB2API_ADMIN_PASSWORD"

postgres_user = "sub2api"
postgres_database = "sub2api"
postgres_password_mode = "generate"
postgres_password = ""
postgres_password_env = "VPSDEPLOY_SUB2API_POSTGRES_PASSWORD"

redis_password_mode = "generate"
redis_password = ""
redis_password_env = "VPSDEPLOY_SUB2API_REDIS_PASSWORD"

jwt_secret_mode = "generate"
jwt_secret = ""
jwt_secret_env = "VPSDEPLOY_SUB2API_JWT_SECRET"

totp_key_mode = "generate"
totp_key = ""
totp_key_env = "VPSDEPLOY_SUB2API_TOTP_KEY"

# Safer defaults for an Internet-facing API gateway.
security_url_allowlist_enabled = true
allow_insecure_http = false
allow_private_hosts = false

[hardening]
enabled = false

[hardening.ssh]
enabled = false
current_port = 22
new_port = 4522
# Keep both ports during migration; set false only after testing the new port through the cloud firewall.
keep_current_port = true
create_admin_user = true
admin_user = "deploy"
copy_root_authorized_keys = true
grant_sudo = true
admin_password_mode = "prompt"
admin_password_hash = ""
disable_root_login = false
disable_password_auth = true
allow_users = ["root", "deploy"]
disable_tcp_forwarding = false
disable_agent_forwarding = true
disable_x11_forwarding = true
max_auth_tries = 3
login_grace_time = 30
client_alive_interval = 300
client_alive_count_max = 2

[hardening.fail2ban]
enabled = true
max_retry = 5
find_time = "10m"
ban_time = "1h"
ignore_ips = []
readiness_timeout = 15
readiness_interval = 1.0

# Disabled by default: prefer the cloud provider firewall/security group.
# If enabled, SSH, proxy, panel/subscription, and configured published ports are allowed.
[hardening.ufw]
enabled = false
default_incoming = "deny"
default_outgoing = "allow"
logging = true
logging_level = "low"

[hardening.unattended_upgrades]
enabled = true
automatic_reboot = false
reboot_time = "04:30"

[hardening.system]
disable_apport = true
enable_sysctl = true
disable_redirects = true
remove_admin_from_docker_group = true
