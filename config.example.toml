[stack]
install_dir = "/opt/proxy-stack"
timezone = "UTC"
install_docker = true
prune_dangling_images = true

[domains]
panel = "panel.example.net"
node = "node.example.net"
# Required only when panel.tls.mode = "acme_dns".
acme_email = "admin@example.net"

[cloudflare]
# Used only by acme_dns mode. Prefer CLOUDFLARE_API_TOKEN in the environment.
api_token = ""

[ports]
proxy = 443
panel_public = 8443
panel_internal = 2053
subscription_internal = 2096
publish_proxy_udp = false

[panel]
path = "/"
subscription_path = "/sub"
basic_auth_user = "admin"
basic_auth_password = ""
allowed_cidrs = []

[panel.tls]
mode = "cloudflare_origin"
# Automatic issuance uses CLOUDFLARE_ORIGIN_CA_TOKEN and writes the key only to the VPS.
auto_create = true
validity_days = 5475
force_reissue = false
api_token = ""
# Used only when auto_create = false.
certificate_file = "/root/cloudflare-origin.crt"
private_key_file = "/root/cloudflare-origin.key"

[docker]
xui_image = "ghcr.io/mhsanaei/3x-ui:latest"
caddy_image = "caddy:2-alpine"
network_name = "proxy_stack"
enable_ipv6 = true
ipv6_subnet = ""
force_rebuild_caddy = false

[dns]
enabled = false
provider = "cloudflare"
# Prefer CLOUDFLARE_DNS_API_TOKEN instead of storing a token here.
api_token = ""
auto_detect_addresses = true
create_ipv4 = true
create_ipv6 = true
# 1 means Cloudflare automatic TTL.
ttl = 1
# Optional fixed addresses. Leave empty to detect from the VPS.
ipv4_address = ""
ipv6_address = ""
ipv4_detection_url = "https://api4.ipify.org"
ipv6_detection_url = "https://api6.ipify.org"

[dns.panel]
enabled = true
proxied = true

[dns.node]
enabled = true
# Reality nodes must remain DNS only.
proxied = false

[hardening]
enabled = false

[hardening.ssh]
enabled = false
current_port = 22
new_port = 4522
create_admin_user = true
admin_user = "deploy"
copy_root_authorized_keys = true
grant_sudo = true

# Sudo requires the deploy user's password; passwordless sudo is not used.
# Options:
#   "prompt"   - securely ask twice during deployment (recommended)
#   "generate" - generate a strong password and print it once at successful exit
#   "hash"     - read a password hash from admin_password_hash or
#                VPSDEPLOY_ADMIN_PASSWORD_HASH
admin_password_mode = "prompt"
admin_password_hash = ""
# VPSDEPLOY_ADMIN_PASSWORD may provide plaintext temporarily through the environment.

# SSH remains key-only even though the local user has a password for sudo.
disable_root_login = false
disable_password_auth = true
allow_users = ["root", "deploy"]
disable_tcp_forwarding = false
disable_agent_forwarding = true
disable_x11_forwarding = true
max_auth_tries = 3
login_grace_time = 30
client_alive_interval = 300
client_alive_count_max = 2

[hardening.fail2ban]
enabled = true
max_retry = 5
find_time = "10m"
ban_time = "1h"
ignore_ips = []
readiness_timeout = 15
readiness_interval = 1.0

[hardening.unattended_upgrades]
enabled = true
automatic_reboot = false
reboot_time = "04:30"

[hardening.system]
disable_apport = true
enable_sysctl = true
disable_redirects = true
remove_admin_from_docker_group = true
