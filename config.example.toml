[stack]
install_dir = "/opt/proxy-stack"
timezone = "UTC"
install_docker = true
prune_dangling_images = true

[domains]
panel = "panel.example.net"
subscription = "sub.example.net"
node = "node.example.net"
# Required only when panel.tls.mode = "acme_dns".
acme_email = "admin@example.net"

[cloudflare]
# Used only by acme_dns mode. Prefer CLOUDFLARE_API_TOKEN in the environment.
api_token = ""

[ports]
proxy = 443
panel_public = 8443
panel_internal = 2053
subscription_internal = 2096
publish_proxy_udp = false

[panel]
path = "/"
subscription_path = "/sub"
allowed_cidrs = []

# Caddy BasicAuth protects only the panel host. The dedicated subscription
# host exposes only subscription_path and returns 404 for every other path.
# password_mode: "prompt", "generate", "config", or "environment".
basic_auth_user = "gateway-admin"
basic_auth_password_mode = "prompt"
basic_auth_password = ""
basic_auth_password_env = "VPSDEPLOY_CADDY_PASSWORD"

[panel.xui]
enabled = true
username = "xui-admin"
password_mode = "prompt"
password = ""
password_env = "VPSDEPLOY_XUI_PASSWORD"
cli = "auto"
allow_default_credentials = false

[panel.tls]
mode = "cloudflare_origin"
auto_create = true
validity_days = 5475
# Set true once after adding or changing panel/subscription/Sub2API hostnames.
force_reissue = false
api_token = ""
# Leave empty to derive SANs from panel, subscription, and enabled Sub2API domains.
hostnames = []
certificate_file = "/root/cloudflare-origin.crt"
private_key_file = "/root/cloudflare-origin.key"

[docker]
xui_image = "ghcr.io/mhsanaei/3x-ui:latest"
caddy_image = "caddy:2-alpine"
network_name = "proxy_stack"
enable_ipv6 = true
ipv6_subnet = ""
force_rebuild_caddy = false

[dns]
enabled = false
provider = "cloudflare"
api_token = ""
auto_detect_addresses = true
create_ipv4 = true
create_ipv6 = true
ttl = 1
ipv4_address = ""
ipv6_address = ""
ipv4_detection_url = "https://api4.ipify.org"
ipv6_detection_url = "https://api6.ipify.org"

[dns.panel]
enabled = true
proxied = true

[dns.subscription]
enabled = true
# Proxied is supported, but Cloudflare challenges/Access must not be applied
# to the subscription host because proxy clients cannot solve browser challenges.
proxied = true

[dns.node]
enabled = true
proxied = false

[dns.sub2api]
enabled = true
proxied = true

# Optional independent Sub2API stack: application + PostgreSQL + Redis.
[sub2api]
enabled = false
install_dir = "/opt/sub2api"
image = "weishaw/sub2api:latest"
domain = "api.example.net"
timezone = "Asia/Shanghai"
internal_port = 8080
# Keep false when Caddy is used. If enabled, only localhost is published.
publish_port = false
published_port = 8080
readiness_timeout = 120

admin_email = "admin@example.net"
admin_password_mode = "prompt"
admin_password = ""
admin_password_env = "VPSDEPLOY_SUB2API_ADMIN_PASSWORD"

postgres_user = "sub2api"
postgres_database = "sub2api"
postgres_password_mode = "generate"
postgres_password = ""
postgres_password_env = "VPSDEPLOY_SUB2API_POSTGRES_PASSWORD"

redis_password_mode = "generate"
redis_password = ""
redis_password_env = "VPSDEPLOY_SUB2API_REDIS_PASSWORD"

jwt_secret_mode = "generate"
jwt_secret = ""
jwt_secret_env = "VPSDEPLOY_SUB2API_JWT_SECRET"

totp_key_mode = "generate"
totp_key = ""
totp_key_env = "VPSDEPLOY_SUB2API_TOTP_KEY"

# Safer defaults for an Internet-facing API gateway.
security_url_allowlist_enabled = true
allow_insecure_http = false
allow_private_hosts = false

[hardening]
enabled = false

[hardening.ssh]
enabled = false
current_port = 22
new_port = 4522
create_admin_user = true
admin_user = "deploy"
copy_root_authorized_keys = true
grant_sudo = true
admin_password_mode = "prompt"
admin_password_hash = ""
disable_root_login = false
disable_password_auth = true
allow_users = ["root", "deploy"]
disable_tcp_forwarding = false
disable_agent_forwarding = true
disable_x11_forwarding = true
max_auth_tries = 3
login_grace_time = 30
client_alive_interval = 300
client_alive_count_max = 2

[hardening.fail2ban]
enabled = true
max_retry = 5
find_time = "10m"
ban_time = "1h"
ignore_ips = []
readiness_timeout = 15
readiness_interval = 1.0

[hardening.unattended_upgrades]
enabled = true
automatic_reboot = false
reboot_time = "04:30"

[hardening.system]
disable_apport = true
enable_sysctl = true
disable_redirects = true
remove_admin_from_docker_group = true
